name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -v

  e2e-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest.env can be sourced
        run: |
          set -a
          . verify/manifest.env
          test -n "$MODE" || { echo "MODE not set"; exit 1; }
          test -n "$UP"   || { echo "UP not set"; exit 1; }
          test -n "$DOWN" || { echo "DOWN not set"; exit 1; }
          test -n "$READY" || { echo "READY not set"; exit 1; }
          test -n "$ACCEPTANCE" || { echo "ACCEPTANCE not set"; exit 1; }
          test -n "$TEST_DEPS" || { echo "TEST_DEPS not set"; exit 1; }
          echo "manifest.env OK — MODE=$MODE PORT=$PORT"
